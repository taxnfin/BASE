<style>

* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; }
a { color:inherit; text-decoration:none; }
.shell { display:flex; min-height:100vh; }
.side { width:220px; background:var(--panel); border-right:1px solid var(--line); padding:24px 14px; position:fixed; top:0; bottom:0; }
.side .logo { font-size:20px; font-weight:700; margin-bottom:28px; padding-left:10px; }
.side .logo b { color:var(--acc); }
.side a.nav { display:block; padding:10px 12px; border-radius:8px; color:var(--dim); margin-bottom:4px; font-size:14px; cursor:pointer; }
.side a.nav:hover, .side a.nav.active { background:var(--hl); color:var(--text); }
.main { margin-left:220px; flex:1; padding:28px 32px; max-width:1200px; }
h1 { font-size:22px; margin-bottom:18px; }
h2 { font-size:16px; margin:18px 0 10px; color:var(--dim); font-weight:600; }

th { text-align:left; padding:10px 12px; color:var(--dim); font-size:12px; text-transform:uppercase; border-bottom:1px solid var(--line); }
td { padding:10px 12px; border-bottom:1px solid var(--line); }
tr:last-child td { border-bottom:none; }
.btn { background:var(--acc); color:#08121c; border:none; padding:10px 16px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
.btn:hover { background:var(--accd); }
.btn.sec { background:transparent; color:var(--text); border:1px solid var(--line); }
.btn:disabled { opacity:.5; cursor:default; }
.row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:16px; }
input, select { background:#101827; border:1px solid var(--line); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; }
.badge { padding:3px 8px; border-radius:20px; font-size:12px; font-weight:600; }
.badge.ok { background:rgba(57,198,163,.15); color:var(--acc); }
.badge.warn { background:rgba(224,99,122,.15); color:var(--red); }
.auth { max-width:380px; margin:12vh auto; background:var(--panel); border:1px solid var(--line); padding:30px; border-radius:14px; display:flex; flex-direction:column; gap:12px; }
.muted { color:var(--dim); font-size:13px; }
.err { color:var(--red); font-size:13px; }
label { color:var(--dim); font-size:13px; }
.scrollx { overflow-x:auto; border:1px solid var(--line); border-radius:12px; }
.scrollx table { border:none; border-radius:0; }
.flux th, .flux td { white-space:nowrap; font-size:13px; padding:7px 10px; }
.flux td:first-child, .flux th:first-child { position:sticky; left:0; background:var(--panel); z-index:2; min-width:210px; }
.flux tr.grp td { background:var(--hl); font-weight:700; }
.flux tr.tot td { border-top:2px solid var(--acc); font-weight:700; }
.chip { display:inline-block; padding:8px 12px; border:1px solid var(--line); border-radius:10px; cursor:pointer; margin:0 6px 6px 0; }
.chip.on { border-color:var(--acc); background:rgba(57,198,163,.12); }
.chip .k2 { font-size:11px; color:var(--dim); display:block; }
.rolado { background:rgba(255,187,92,.15); color:#ffbb5c; padding:2px 6px; border-radius:8px; font-size:11px; }
body.light { --bg:#f2f5f9; --panel:#ffffff; --line:#dfe6ee; --text:#17222e; --dim:#5d6b7d; --hl:#e9eef5; }
body.light input, body.light select { background:#f6f8fb; }
body.light .btn.sec { color:#17222e; }
.metric { border-left:3px solid var(--acc); }
.metric .f { font-family:monospace; font-size:12px; color:var(--dim); margin-top:6px; display:block; }
.modal { position:fixed; inset:0; background:rgba(5,10,18,.65); z-index:50; display:flex; align-items:flex-start; justify-content:center; padding:5vh 16px; }
.mbox { background:var(--panel); border:1px solid var(--line); border-radius:14px; max-width:760px; width:100%; max-height:88vh; overflow-y:auto; padding:22px 26px; }
.mbox h3 { font-size:16px; margin:14px 0 6px; color:var(--dim); }
.kv { display:grid; grid-template-columns:170px 1fr; gap:4px 12px; font-size:14px; }
.kv .kk { color:var(--dim); }
.dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; }
.chartbox { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:18px; }
.g2 { display:grid; grid-template-columns:minmax(0,2fr) minmax(280px,1fr); gap:16px; margin-bottom:18px; }
.g2b { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px; }
@media(max-width:900px){ .g2,.g2b{ grid-template-columns:1fr; } }
.alerta { border-left:3px solid var(--line); padding:9px 12px; margin-bottom:10px; background:rgba(128,128,128,.06); border-radius:0 8px 8px 0; }
.knum { font-variant-numeric:tabular-nums; }
</style>

var LINKS=[['dashboard','Resumen'],['conexiones','Conexiones'],['facturas','Facturas (CFDI)'],['movimientos','Movimientos'],['contactos','Clientes y Proveedores'],['categorias','Categorías'],['cxc','CxC / CxP'],['flujo','Flujo de Efectivo'],['financiamiento','Financiamiento'],['auditoria','Portal de Auditoría'],['proyectos','Proyectos'],['metricas','Métricas'],['reporte','Reporte Empresarial'],['conciliacion','Conciliación'],['impuestos','Impuestos'],['perfil','Perfil']];

function regimenLabel(code){var r=REGIMENES.find(function(x){return x[0]===code;});return r?(r[0]+' — '+r[1]):(code||'—');}
function pct(v){return (v===null||v===undefined||v==='')?'—':(Number(v)*100).toFixed(4).replace(/\.?0+$/,'')+'%';}

// ===== Semanas (lunes a domingo; S1 = semana que contiene el 1 de enero) =====
function weekStartOfYear(y){var d=new Date(y,0,1);var dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);d.setHours(0,0,0,0);return d;}
function weekInfo(dt){var d=new Date(dt);if(isNaN(d.getTime()))return null;d.setHours(0,0,0,0);var y=d.getFullYear();var nxt=weekStartOfYear(y+1);if(d>=nxt){y=y+1;}var start=weekStartOfYear(y);if(d<start){y=y-1;start=weekStartOfYear(y);}var n=Math.floor((d-start)/(7*864e5))+1;return {y:y,n:n};}
function weekStart(y,n){var s=weekStartOfYear(y);var d=new Date(s);d.setDate(d.getDate()+(n-1)*7);return d;}
function fShort(d){return d.toLocaleDateString('es-MX',{day:'2-digit',month:'short'});}
function todayW(){return weekInfo(new Date());}

// ===== Tipos de cambio (fx_rates vía edge function fx) =====
var FX={MXN:1};
async function loadFx(){
  try{
    var s=await sb.auth.getSession();
    var r=await fetch(URLB+'/functions/v1/fx',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.data.session.access_token},body:'{}'});
    var j=await r.json();
    if(j&&j.latest){FX=j.latest;FX.MXN=1;}
  }catch(e){}
  return FX;
}
function toMXN(monto,moneda){var m=(moneda||'MXN').toUpperCase();return Number(monto||0)*(FX[m]||1);}
function fmtMon(n,mon){var m=(mon||'MXN').toUpperCase();return (Number(n||0)).toLocaleString('es-MX',{style:'currency',currency:(m==='MXN'||m==='USD'||m==='EUR')?m:'MXN'});}
// Semana proyectada con rolado: si ya venció y sigue pendiente, se corre a la semana actual
function projWeek(fpe){
  var tw=todayW();
  if(!fpe)return {y:tw.y,n:tw.n,rolled:false};
  var w=weekInfo(fpe);if(!w)return {y:tw.y,n:tw.n,rolled:false};
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var f=new Date(fpe);f.setHours(0,0,0,0);
  if(f<hoy)return {y:tw.y,n:tw.n,rolled:true};
  return {y:w.y,n:w.n,rolled:false};
}
function agingBucket(fpe){
  if(!fpe)return 'vigente';
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var f=new Date(fpe);f.setHours(0,0,0,0);
  var dias=Math.floor((hoy-f)/864e5);
  if(dias<=0)return 'vigente';
  if(dias<=30)return '1-30';
  if(dias<=60)return '31-60';
  if(dias<=90)return '61-90';
  if(dias<=120)return '91-120';
  return '+120';
}
var BUCKETS=['vigente','1-30','31-60','61-90','91-120','+120'];

var CHARTS=[];
function mkChart(id,cfg){var el=document.getElementById(id);if(!el||!window.Chart)return;CHARTS.push(new Chart(el,cfg));}
async function vDashboard(m){
  CHARTS.forEach(function(c){try{c.destroy();}catch(e){}});CHARTS=[];
  await loadFx();
  var haceAnio=new Date();haceAnio.setDate(haceAnio.getDate()-365);
  var res=await Promise.all([
    sb.from('cfdis').select('direction,nombre_emisor,nombre_receptor,rfc_receptor,total,moneda,estado,tipo_comprobante,status_pago,fecha_pago,fecha_pago_estimada,fecha_emision,category_id').gte('fecha_emision',haceAnio.toISOString()).limit(10000),
    sb.from('bank_accounts').select('name,account_number,balance,currency,site_name,refreshed_at'),
    sb.from('categories').select('id,nombre'),
    sb.from('cfdis').select('uuid_cfdi,direction,nombre_emisor,nombre_receptor,total,fecha_emision').order('fecha_emision',{ascending:false}).limit(8)
  ]);
  var cfdis=(res[0].data||[]).filter(function(c){return c.estado!=='cancelado'&&String(c.tipo_comprobante||'I').toUpperCase()==='I';});
  var accts=res[1].data||[], recent=res[3].data||[];
  var catName={};(res[2].data||[]).forEach(function(c){catName[c.id]=c.nombre;});
  var saldo=accts.reduce(function(a,c){return a+toMXN(c.balance,c.currency);},0);
  var ancla=null;accts.forEach(function(a){if(a.refreshed_at&&(!ancla||a.refreshed_at>ancla))ancla=a.refreshed_at;});
  var UMBRAL=Number(localStorage.getItem('umbral'))||500000;

  var tw=todayW(), N=20, OFF=8, i;
  var wk=[];for(i=0;i<N;i++){var wd=weekStart(tw.y,tw.n-OFF+i);var wi=weekInfo(wd);wk.push({key:wi.y+'-'+wi.n,lbl:'S'+wi.n,date:wd,ing:0,eg:0});}
  var idx={};wk.forEach(function(w,j){idx[w.key]=j;});
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var d90=new Date();d90.setDate(d90.getDate()-90);
  var cxc=0,cxp=0,nCxc=0,nCxp=0,cxcVenc=0,nVenc=0,ventas90=0,compras90=0;
  var clienteCxc={},inRows=[],outRows=[];
  cfdis.forEach(function(c){
    var mxn=toMXN(c.total,c.moneda);if(!mxn)return;
    var em=c.direction==='emitida';
    if(new Date(c.fecha_emision)>=d90){if(em)ventas90+=mxn;else compras90+=mxn;}
    var w,pro=false;
    if(c.status_pago==='pagado'){
      w=weekInfo(c.fecha_pago||c.fecha_emision);
    }else{
      var p=projWeek(c.fecha_pago_estimada);w={y:p.y,n:p.n};pro=true;
      if(em){cxc+=mxn;nCxc++;var ck=c.nombre_receptor||c.rfc_receptor||'—';clienteCxc[ck]=(clienteCxc[ck]||0)+mxn;
        if(agingBucket(c.fecha_pago_estimada)!=='vigente'){cxcVenc+=mxn;nVenc++;}}
      else{cxp+=mxn;nCxp++;}
    }
    var k=w?(w.y+'-'+w.n):null;
    if(k!==null&&idx[k]!==undefined){
      var j=idx[k],sw=wk[j];
      if(em)sw.ing+=mxn;else sw.eg+=mxn;
      if(pro&&j>=OFF&&j<=OFF+6){
        if(em)inRows.push({who:c.nombre_receptor||'—',sem:sw.lbl,j:j,mxn:mxn,mon:(c.moneda||'MXN').toUpperCase()});
        else outRows.push({who:c.nombre_emisor||'—',sem:sw.lbl,j:j,mxn:mxn,cat:catName[c.category_id]||'CxP'});
      }
    }
  });
  var saldos=[];saldos[OFF]=saldo;
  for(i=OFF+1;i<N;i++)saldos[i]=saldos[i-1]+wk[i].ing-wk[i].eg;
  for(i=OFF-1;i>=0;i--)saldos[i]=saldos[i+1]-wk[i+1].ing+wk[i+1].eg;
  var dso=ventas90>0?Math.round(cxc/ventas90*90):null;
  var dpo=compras90>0?Math.round(cxp/compras90*90):null;
  var posProj=saldo+cxc-cxp;
  var risk=null;for(i=OFF;i<N;i++){if(saldos[i]<UMBRAL){risk={lbl:wk[i].lbl,saldo:saldos[i],date:wk[i].date};break;}}
  var topCli=null,topV=0,ck2;for(ck2 in clienteCxc){if(clienteCxc[ck2]>topV){topV=clienteCxc[ck2];topCli=ck2;}}
  var semCob=ventas90>0?topV/(ventas90/13):null;

  function kpi(t,v,sub,color){return '<div class="card"><div class="k" style="letter-spacing:.06em;font-size:11px;text-transform:uppercase">'+t+'</div><div class="v knum" style="'+(color?'color:'+color:'')+'">'+v+'</div><div class="muted" style="font-size:11px">'+sub+'</div></div>';}
  var h='<div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px"><h1>Dashboard</h1><span class="muted">Semana actual: S'+tw.n+' · umbral '+fmt(UMBRAL)+'</span></div>';
  h+='<div class="cards">'+
    kpi('Posición de caja (MXN)',fmt(saldo),accts.length+' cuentas activas'+(ancla?' · ancla ⚓ '+fdate(ancla):''),null)+
    kpi('CxC viva',fmt(cxc),nCxc+' facturas'+(dso!==null?' · DSO-90d: '+dso+' días':''),null)+
    kpi('CxP viva',fmt(cxp),nCxp+' facturas'+(dpo!==null?' · DPO-90d: '+dpo+' días':''),'var(--red)')+
    kpi('Posición proyectada',fmt(posProj),'caja + CxC − CxP'+(risk?' · <span style="color:#d9a13b">'+risk.lbl+' en riesgo</span>':''),'var(--acc)')+
    '</div>';

  var alerts='';
  if(risk)alerts+='<div class="alerta" style="border-left-color:#d9a13b"><b>Saldo bajo proyectado</b><span class="muted" style="float:right">'+risk.lbl+' · '+fdate(risk.date)+'</span><br><span class="muted">'+risk.lbl+' cierra en '+fmt(risk.saldo)+', debajo del umbral de '+fmt(UMBRAL)+'.</span></div>';
  if(cxcVenc>0)alerts+='<div class="alerta" style="border-left-color:var(--red)"><b>Cobranza vencida</b><span class="muted" style="float:right">hoy</span><br><span class="muted">'+fmt(cxcVenc)+' en '+nVenc+' factura(s) con vencimiento anterior a hoy.</span></div>';
  if(topCli&&cxc>0&&topV/cxc>0.25)alerts+='<div class="alerta" style="border-left-color:#d9a13b"><b>Concentración de cliente</b><span class="muted" style="float:right">riesgo '+(topV/cxc>0.5?'alto':'medio')+'</span><br><span class="muted">'+esc(topCli)+' sostiene '+(semCob!==null?semCob.toFixed(1):'—')+' semanas de cobranza ('+Math.round(topV/cxc*100)+'% de la CxC).</span></div>';
  var nAl=(alerts.match(/class="alerta"/g)||[]).length;
  if(!alerts)alerts='<p class="muted">Sin alertas activas ✔</p>';

  h+='<div class="g2">'+
    '<div class="chartbox" style="margin-bottom:0"><b>Flujo de efectivo — 13 semanas</b> <span class="muted">motor canónico · anclas bancarias</span>'+
    '<div style="font-size:11px;margin-top:4px"><span class="dot" style="background:#5b7099"></span>Real&nbsp;&nbsp;<span class="dot" style="background:rgba(91,168,255,.5)"></span>Proyectado&nbsp;&nbsp;<span class="dot" style="background:rgba(224,99,122,.9)"></span>Saldo &lt; umbral</div>'+
    '<div style="height:250px;margin-top:8px"><canvas id="chFlujo"></canvas></div></div>'+
    '<div class="chartbox" style="margin-bottom:0"><b>Alertas de tesorería</b> <span class="muted">'+nAl+' activas</span><div style="margin-top:10px">'+alerts+'</div></div>'+
    '</div>';

  var in4=inRows.filter(function(r){return r.j<=OFF+4;}).sort(function(a,b){return b.mxn-a.mxn;}).slice(0,5);

var c69Tries=0;
async function check69(m){
  var msg=document.getElementById('c69msg');

    var r=await fetch(URLB+'/functions/v1/sat69b',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+s.data.session.access_token},body:'{}'});
    var j=await r.json(); if(j.error)throw new Error(j.error);

      box.style.borderLeftColor='var(--red)';
      msg.innerHTML='<b style="color:var(--red)">⚠️ '+j.matches.length+' RFC(s) de tus proveedores/contactos aparecen en listados del SAT.</b> Verifica antes de pagar o deducir facturas de estos emisores.';
      var t='<table style="margin-top:10px"><thead><tr><th>RFC</th><th>Nombre</th><th>Lista</th><th>Situación</th></tr></thead><tbody>';
      j.matches.forEach(function(x){t+='<tr><td>'+esc(x.rfc)+'</td><td>'+esc(x.nombre||'—')+'</td><td><span class="badge warn">'+(x.lista==='69B'?'69-B (EFOS)':'69')+'</span></td><td>'+esc(x.situacion||'—')+'</td></tr>';});
      det.innerHTML=t+'</tbody></table>';
    }else if(!j.fecha_listado&&j.refreshing){
      box.style.borderLeftColor='var(--warn,#d9a13b)';
      msg.innerHTML='<span class="muted">⏳ Preparando la primera verificación: descargando el listado 69-B del SAT (puede tardar unos minutos). Esta página se actualizará sola.</span>';
    }else{
      box.style.borderLeftColor='var(--acc)';
      msg.innerHTML='<span style="color:var(--acc)">✔ Sin coincidencias.</span> Se revisaron '+(j.revisados||0)+' RFCs contra el listado 69-B (EFOS definitivos/presuntos) y el art. 69 (no localizados).'+(j.fecha_listado?' Listado del SAT cargado el '+fdate(j.fecha_listado)+'.':'');
    }
    if(j.refreshing){
      msg.innerHTML+=' <span class="muted">⏳ Actualizando listado del SAT en segundo plano…</span>';
      if(c69Tries<6){c69Tries++;setTimeout(function(){check69(m);},60000);}

    }
  }catch(e){if(msg)msg.textContent='No se pudo verificar las listas del SAT: '+String(e.message||e);}
}

function loadScript(src){
  return new Promise(function(res,rej){
    var t=document.querySelector('script[src="'+src+'"]');
    if(t)return res();
    var sc=document.createElement('script');sc.src=src;sc.onload=function(){res();};
    sc.onerror=function(){rej(new Error('No se pudo cargar '+src));};
    document.head.appendChild(sc);
  });
}

// ===== Calendario SAT 2026 (persona moral) =====
var FERIADOS_2026=['2026-01-01','2026-02-02','2026-03-16','2026-05-01','2026-09-16','2026-11-16','2026-12-25'];
function _isoD(d){var p=function(n){return (n<10?'0':'')+n;};return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function habilSAT(iso){
  var d=new Date(iso+'T12:00:00');
  while(d.getDay()===0||d.getDay()===6||FERIADOS_2026.indexOf(_isoD(d))>=0){d.setDate(d.getDate()+1);}
  return _isoD(d);
}
function calSat2026(){
  var MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var rows=[];
  for(var m=0;m<12;m++){
    var per=MES[m]+' 2026';
    var d17=habilSAT(_isoD(new Date(2026,m+1,17)));
    rows.push({fecha:d17,obligacion:'Pago provisional ISR + IVA definitivo + retenciones',periodo:per,tipo:'Federal'});
    rows.push({fecha:d17,obligacion:'Entero de cuotas IMSS (mensual)',periodo:per,tipo:'Seguridad social'});
    rows.push({fecha:habilSAT(_isoD(new Date(2026,m+2,0))),obligacion:'DIOT — operaciones con terceros',periodo:per,tipo:'Informativa'});
    if(m%2===1){rows.push({fecha:d17,obligacion:'RCV e Infonavit (bimestral)',periodo:MES[m-1]+'–'+MES[m]+' 2026',tipo:'Seguridad social'});}
  }
  rows.push({fecha:'2026-03-31',obligacion:'Declaración anual personas morales — ejercicio 2025',periodo:'ejercicio 2025',tipo:'Anual'});
  rows.push({fecha:'2026-05-30',obligacion:'Pago de PTU a trabajadores (60 días tras la anual)',periodo:'ejercicio 2025',tipo:'Laboral'});
  rows.sort(function(a,b){return a.fecha<b.fecha?-1:1;});
  return rows;
}

async function vConciliacion(m){
  var res=await Promise.all([
    sb.from('cfdis').select('id,direction,nombre_emisor,nombre_receptor,total,moneda,fecha_emision,status_pago').neq('estado','cancelado').limit(2000),
    sb.from('bank_transactions').select('id,description,amount,dt_transaction').limit(4000),
    sb.from('reconciliations').select('cfdi_id,transaction_id')
  ]);
  var cfdis=res[0].data||[], txs=res[1].data||[], recs=res[2].data||[];
  var usedC={},usedT={};
  recs.forEach(function(x){usedC[x.cfdi_id]=1;usedT[x.transaction_id]=1;});
  var sugs=[];
  for(var i=0;i<cfdis.length&&sugs.length<200;i++){
    var c=cfdis[i];
    if(usedC[c.id]||!c.total)continue;
    var target=c.direction==='emitida'?Number(c.total):-Number(c.total);
    var cd=c.fecha_emision?new Date(c.fecha_emision).getTime():null;
    for(var j=0;j<txs.length;j++){
      var t=txs[j];
      if(usedT[t.id])continue;
      if(Math.abs(Number(t.amount)-target)>0.5)continue;
      if(cd&&Math.abs(new Date(t.dt_transaction).getTime()-cd)>60*864e5)continue;
      sugs.push({c:c,t:t}); usedT[t.id]=1; usedC[c.id]=1; break;
    }
  }
  async function conciliar(s,modo){
    var u=await sb.auth.getUser();
    await sb.from('reconciliations').insert({user_id:u.data.user.id,cfdi_id:s.c.id,transaction_id:s.t.id,matched_by:modo,confidence:modo==='auto'?0.95:0.99});
    // el pago cae en el flujo en la semana del movimiento bancario
    await sb.from('cfdis').update({status_pago:'pagado',fecha_pago:String(s.t.dt_transaction).slice(0,10)}).eq('id',s.c.id);
  }
  var h='<h1>Conciliación banco ↔ facturas</h1>'+
    '<p class="muted" style="margin-bottom:14px">'+recs.length+' conciliaciones confirmadas. Al conciliar, la factura se marca cobrada/pagada con la <b>fecha real del movimiento bancario</b> y cae en esa semana del Flujo de Efectivo.</p>'+
    '<div class="row"><button class="btn" id="autoRec" '+(sugs.length?'':'disabled')+'>⚡ Conciliar automáticamente ('+sugs.length+')</button><span class="muted" id="recmsg"></span></div>';
  if(!sugs.length){h+='<p class="muted">No hay sugerencias pendientes (monto igual ±$0.50 y fecha a 60 días).</p>';}
  else{
    h+='<table><thead><tr><th>CFDI</th><th>Total</th><th>Movimiento bancario</th><th>Monto</th><th>Fechas (emisión / banco)</th><th></th></tr></thead><tbody>';
    sugs.forEach(function(s,ix){
      h+='<tr><td>'+esc(s.c.direction==='emitida'?s.c.nombre_receptor:s.c.nombre_emisor)+' <span class="badge '+(s.c.direction==='emitida'?'ok':'warn')+'">'+s.c.direction+'</span></td><td>'+fmtMon(s.c.total,s.c.moneda)+'</td><td>'+esc(s.t.description)+'</td><td>'+fmt(s.t.amount)+'</td><td class="muted">'+fdate(s.c.fecha_emision)+' / '+fdate(s.t.dt_transaction)+'</td><td><button class="btn" data-ix="'+ix+'">Conciliar</button></td></tr>';
    });
    h+='</tbody></table>';
  }
  m.innerHTML=h;
  document.getElementById('autoRec').onclick=async function(){
    document.getElementById('recmsg').textContent='Conciliando '+sugs.length+' pares...';
    for(var k=0;k<sugs.length;k++){await conciliar(sugs[k],'auto');}
    document.getElementById('recmsg').textContent='Listo: '+sugs.length+' facturas conciliadas y registradas como cobradas/pagadas.';
    vConciliacion(m);
  };
  m.querySelectorAll('button[data-ix]').forEach(function(b){
    b.onclick=async function(){
      await conciliar(sugs[Number(b.getAttribute('data-ix'))],'manual');
      vConciliacion(m);
    };
  });
}

// ===== FLUJO DE EFECTIVO SEMANAL (v2: filtro de semanas, colapsar, KPIs, escenarios) =====
var FL={collapsed:{},from:null,to:null,esc:(function(){try{return JSON.parse(localStorage.getItem('tf_esc'))||null;}catch(e){return null;}})()||{pc:-30,pg:15,oc:20,og:-10}};
async function vFlujo(m,anio,monSel){
  var tw=todayW();
  anio=anio||tw.y; monSel=monSel||'MXN';
  if(FL.from===null){FL.from=(anio===tw.y)?Math.max(1,tw.n-4):1;FL.to=(anio===tw.y)?Math.min(52,tw.n+13):52;}
  await loadFx();
  var res=await Promise.all([
    sb.from('cfdis').select('direction,total,moneda,category_id,status_pago,fecha_pago,fecha_pago_estimada,fecha_emision,tipo_comprobante,estado,nombre_receptor,nombre_emisor').neq('estado','cancelado').limit(10000),
    sb.from('categories').select('id,nombre,grupo,parent_id'),
    sb.from('forecast_items').select('tipo,monto,moneda,category_id,fecha_estimada,realizado'),
    sb.from('bank_accounts').select('balance,currency')
  ]);
  var cfdis=(res[0].data||[]).filter(function(c){return String(c.tipo_comprobante||'I').toUpperCase()==='I';});
  var cats=res[1].data||[], fcst=res[2].data||[], accts=res[3].data||[];
  var catById={};cats.forEach(function(c){catById[c.id]=c;});
  var bank=accts.reduce(function(a,c){return a+toMXN(c.balance,c.currency);},0);
  var conv=function(mxn){return monSel==='MXN'?mxn:mxn/(FX[monSel]||1);};
  function fmt2(n){return (Number(n||0)).toLocaleString('es-MX',{style:'currency',currency:(monSel==='USD'||monSel==='EUR')?monSel:'MXN',maximumFractionDigits:0});}

  var W=52;
  var mk=function(){var a=[];for(var i=0;i<=W;i++)a.push(0);return a;};
  var groups={ingreso:{},cogs:{},sga:{}};
  var totals={ingreso:mk(),cogs:mk(),sga:mk()};
  var realIng=mk(),realEg=mk(),projIng=mk(),projEg=mk();

  function rowFor(grp,label){groups[grp][label]=groups[grp][label]||mk();return groups[grp][label];}
  function catInfo(cid,esIngreso){
    var c=cid?catById[cid]:null;
    if(c&&c.parent_id&&catById[c.parent_id])c=catById[c.parent_id];
    if(esIngreso)return {grp:'ingreso',label:c?c.nombre:'Sin categoría'};
    var g=c?(c.grupo==='cogs'?'cogs':'sga'):'sga';
    return {grp:g,label:c?c.nombre:'Sin categoría'};
  }
  function add(esIngreso,cid,wn,mxn,esReal){
    var ci=catInfo(cid,esIngreso);
    rowFor(ci.grp,ci.label)[wn]+=mxn;
    totals[ci.grp][wn]+=mxn;
    if(esIngreso){(esReal?realIng:projIng)[wn]+=mxn;}else{(esReal?realEg:projEg)[wn]+=mxn;}
  }
  cfdis.forEach(function(c){
    var pagado=c.status_pago==='pagado';
    var esIngreso=c.direction==='emitida';
    var mxn=toMXN(c.total,c.moneda);
    if(!mxn)return;
    if(pagado){
      var w=weekInfo(c.fecha_pago||c.fecha_emision);
      if(w&&w.y===anio&&w.n>=1&&w.n<=W)add(esIngreso,c.category_id,w.n,mxn,true);
    }else{
      var pw=projWeek(c.fecha_pago_estimada||c.fecha_emision);
      if(pw.y===anio&&pw.n>=1&&pw.n<=W)add(esIngreso,c.category_id,pw.n,mxn,false);
    }
  });
  fcst.forEach(function(p){
    if(p.realizado)return;
    var pw=projWeek(p.fecha_estimada);
    if(pw.y!==anio||pw.n<1||pw.n>W)return;
    add(p.tipo==='ingreso',p.category_id,pw.n,toMXN(p.monto,p.moneda),false);
  });

  // Saldos encadenados (ancla = saldo bancario al inicio de la semana actual)
  var net=mk();for(var w2=1;w2<=W;w2++)net[w2]=totals.ingreso[w2]-totals.cogs[w2]-totals.sga[w2];
  var ini=mk(),fin=mk();
  var anchor=(anio===tw.y)?tw.n:(anio<tw.y?null:1);
  if(anchor!==null){
    ini[anchor]=(anio===tw.y)?bank:0;
    for(var wf=anchor;wf<=W;wf++){if(wf>anchor)ini[wf]=fin[wf-1];fin[wf]=ini[wf]+net[wf];}
    for(var wb=anchor-1;wb>=1;wb--){fin[wb]=ini[wb+1];ini[wb]=fin[wb]-net[wb];}
  }

  // ===== KPIs (todo formulado) =====
  var kw=[];for(var kk=Math.max(1,tw.n-4);kk<tw.n;kk++)kw.push(kk);
  var avg=function(arr){if(!kw.length)return 0;var s=0;kw.forEach(function(w){s+=arr[w];});return s/kw.length;};
  var burn=avg(realEg), ingAvg=avg(realIng);
  var netBurn=burn-ingAvg;
  var runway=(anio===tw.y)?(netBurn>0?bank/netBurn:Infinity):null;
  var ratio=burn>0?(ingAvg/burn*100):null;
  var critW=null,critV=null;
  if(anchor!==null){for(var wc=tw.n;wc<=Math.min(W,FL.to);wc++){if(critV===null||fin[wc]<critV){critV=fin[wc];critW=wc;}}}
  // Cartera CxC
  var hoy=new Date();hoy.setHours(0,0,0,0);
  var cxcPend=cfdis.filter(function(c){return c.direction==='emitida'&&c.status_pago==='pendiente'&&Number(c.total||0)>0;});
  var cxcTot=0,cxcVenc=0,deudores={};
  cxcPend.forEach(function(c){
    var mxn=toMXN(c.total,c.moneda);cxcTot+=mxn;
    var f=c.fecha_pago_estimada?new Date(c.fecha_pago_estimada):null;
    if(f&&f<hoy){cxcVenc+=mxn;var nm=c.nombre_receptor||'—';deudores[nm]=(deudores[nm]||0)+mxn;}
  });
  var vencPct=cxcTot>0?Math.round(cxcVenc/cxcTot*100):0;
  var topDeud=Object.entries(deudores).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  // Escenarios a 13 semanas (factores solo sobre lo proyectado)
  function escenario(fi,fe){
    if(anchor===null)return null;
    var s=bank,limit=Math.min(W,tw.n+13);
    for(var w5=tw.n;w5<=limit;w5++){s+=realIng[w5]-realEg[w5]+projIng[w5]*fi-projEg[w5]*fe;}
    return {s:s,limit:limit};
  }
  var escP=escenario(1+FL.esc.pc/100,1+FL.esc.pg/100),escB=escenario(1,1),escO=escenario(1+FL.esc.oc/100,1+FL.esc.og/100);

  // ===== Render =====
  var selW=function(id,val){var s='<select id="'+id+'">';for(var i=1;i<=W;i++)s+='<option value="'+i+'"'+(i===val?' selected':'')+'>S'+i+'</option>';return s+'</select>';};
  var h='<h1>Flujo de Efectivo Semanal '+anio+'</h1>'+
    '<div class="row">'+
    '<select id="fl_anio">'+(function(){var s='';for(var y=2024;y<=2037;y++)s+='<option '+(y===anio?'selected':'')+'>'+y+'</option>';return s;})()+'</select>'+
    '<select id="fl_mon"><option '+(monSel==='MXN'?'selected':'')+'>MXN</option><option '+(monSel==='USD'?'selected':'')+'>USD</option><option '+(monSel==='EUR'?'selected':'')+'>EUR</option></select>'+
    '<span class="muted">De</span>'+selW('fl_from',FL.from)+'<span class="muted">a</span>'+selW('fl_to',FL.to)+
    '<button class="btn sec" id="fl_ia">✨ Categorizar</button>'+
    '<span class="muted">TC USD '+(FX.USD?Number(FX.USD).toFixed(2):'—')+' · EUR '+(FX.EUR?Number(FX.EUR).toFixed(2):'—')+'</span>'+
    '</div><div class="muted" id="flmsg" style="margin-bottom:10px"></div>';

  // KPIs
  if(anio===tw.y){
    h+='<div class="cards">'+

12%","description":"Retorno cercano al costo de capital típico. Creación de valor marginal."},{"nivel":"Retorno bajo","color":"#F97316","threshold":"4% - 8%","description":"Probablemente no supera el WACC. Destrucción de valor."},{"nivel":"Retorno muy bajo","color":"#EF4444","threshold":"Menos de 4%","description":"Destrucción significativa de valor. Capital mal invertido."}],"bestPerformers":[{"name":"Software","icon":"Monitor"},{"name":"Consultoría","icon":"Briefcase"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Lujo","icon":"Gem"},{"name":"Tecnología","icon":"Cpu"}],"worstPerformers":[{"name":"Aerolíneas","icon":"Plane"},{"name":"Telecomunicaciones","icon":"Radio"},{"name":"Energía","icon":"Zap"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Minería","icon":"Mountain"}],"quote":{"text":"La prueba más importante de la gestión económica es alcanzar una alta tasa de retorno sobre el capital empleado, no maximizar las utilidades por acción.","author":"Warren Buffett","company":"Berkshire Hathaway"},"comoMejorar":["Mejorar márgenes operativos (incrementar NOPAT)","Reducir capital invertido ocioso o improductivo","Vender activos que no generan retorno adecuado","Optimizar capital de trabajo (reducir inventarios y CxC)","Enfocarse en líneas de negocio con mayor ROIC"]},{"key":"roe","category":"returns","name":"ROE","englishName":"Return on Equity","question":"¿Cuánto retorno generamos para los accionistas?","frequency":"Trimestral | Anual","alternativeNames":"ROE / Retorno sobre el Capital / Return on Equity","sections":{"queMide":"Mide la rentabilidad que obtienen los accionistas sobre su inversión en la empresa. Cuántos pesos de utilidad genera cada peso de capital propio.","razonamiento":"El ROE es función de tres factores (DuPont): margen neto, rotación de activos y apalancamiento. Un ROE alto por apalancamiento excesivo puede ser riesgoso.","relevancia":"Es la métrica favorita de los accionistas. Un ROE alto y sostenible indica que la empresa maximiza el valor para sus dueños. Se usa para comparar con el costo de equity.","formula":"ROE = (Utilidad Neta / Capital Contable) × 100\n\nDescomposición DuPont:\nROE = Margen Neto × Rotación Activos × Apalancamiento","metricasRelacionadas":["roic","roa","net_margin"]},"evaluacion":[{"nivel":"Retorno sobresaliente","color":"#3B82F6","threshold":"25% o más","description":"Excelente generación de valor para accionistas. Empresa de alta calidad."},{"nivel":"Retorno sólido","color":"#10B981","threshold":"15% - 25%","description":"Buen retorno que compensa el riesgo de inversión."},{"nivel":"Retorno aceptable","color":"#F59E0B","threshold":"10% - 15%","description":"Retorno adecuado, cercano al costo de equity típico."},{"nivel":"Retorno bajo","color":"#F97316","threshold":"5% - 10%","description":"No compensa adecuadamente el riesgo. Accionistas podrían buscar alternativas."},{"nivel":"Retorno muy bajo","color":"#EF4444","threshold":"Menos de 5%","description":"Los accionistas pierden poder adquisitivo considerando inflación."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Consumo","icon":"Package"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Finanzas","icon":"Landmark"},{"name":"Software","icon":"Monitor"}],"worstPerformers":[{"name":"Utilities","icon":"Zap"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Telecomunicaciones","icon":"Radio"},{"name":"Minería","icon":"Mountain"},{"name":"Transporte","icon":"Truck"}],"quote":{"text":"Si un negocio genera un 6% de retorno sobre el capital durante 40 años y lo mantienes 40 años, no vas a ganar mucho más que un 6% de retorno, aunque lo hayas comprado con descuento.","author":"Charlie Munger","company":"Berkshire Hathaway"},"comoMejorar":["Incrementar utilidad neta (mejorar márgenes)","Optimizar la estructura de capital","Recomprar acciones si el ROE es alto (reduce capital)","Reinvertir utilidades en proyectos con retorno superior","Eliminar inversiones que diluyen el retorno"]},{"key":"roce","category":"returns","name":"ROCE","englishName":"Return on Capital Employed","question":"¿Qué tan productivo es todo el capital empleado?","frequency":"Trimestral | Anual","alternativeNames":"ROCE / Retorno sobre Capital Empleado / Return on Capital Employed","sections":{"queMide":"Mide el retorno generado sobre todo el capital empleado en el negocio (activos totales menos pasivos circulantes).","razonamiento":"A diferencia del ROE, el ROCE considera tanto la deuda como el equity, dando una visión más completa de la eficiencia en uso de todo el capital disponible.","relevancia":"Muy usado en industrias intensivas en capital. Permite comparar empresas con diferentes estructuras de financiamiento sobre una base común.","formula":"ROCE = (EBIT / Capital Empleado) × 100\n\nDonde:\n• Capital Empleado = Activos Totales - Pasivo Circulante\n• EBIT = Utilidad Operativa","metricasRelacionadas":["roic","roe","roa"]},"evaluacion":[{"nivel":"Retorno sobresaliente","color":"#3B82F6","threshold":"20% o más","description":"Uso excepcionalmente eficiente del capital total."},{"nivel":"Retorno sólido","color":"#10B981","threshold":"12% - 20%","description":"Buen retorno sobre el capital empleado."},{"nivel":"Retorno aceptable","color":"#F59E0B","threshold":"8% - 12%","description":"Retorno adecuado para la mayoría de industrias."},{"nivel":"Retorno bajo","color":"#F97316","threshold":"4% - 8%","description":"Capital empleado genera poco retorno."},{"nivel":"Retorno muy bajo","color":"#EF4444","threshold":"Menos de 4%","description":"El capital estaría mejor empleado en otra inversión."}],"bestPerformers":[{"name":"Software","icon":"Monitor"},{"name":"Consultoría","icon":"Briefcase"},{"name":"Publicidad","icon":"Megaphone"},{"name":"Servicios","icon":"Users"},{"name":"Educación","icon":"GraduationCap"}],"worstPerformers":[{"name":"Telecomunicaciones","icon":"Radio"},{"name":"Utilities","icon":"Zap"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Petróleo","icon":"Flame"},{"name":"Manufactura pesada","icon":"Factory"}],"quote":{"text":"El ROCE es el termómetro de la eficiencia empresarial. Mide si el capital empleado se traduce en ganancias reales.","author":"Joel Greenblatt","company":"Gotham Capital"},"comoMejorar":["Incrementar utilidad operativa sin aumentar activos","Reducir activos fijos improductivos","Mejorar gestión de capital de trabajo","Subcontratar para reducir activos en balance","Desinvertir en divisiones con bajo ROCE"]},{"key":"roa","category":"returns","name":"ROA","englishName":"Return on Assets","question":"¿Qué tan productivos son nuestros activos totales?","frequency":"Trimestral | Anual","alternativeNames":"ROA / Retorno sobre Activos / Return on Assets","sections":{"queMide":"Mide cuánta utilidad neta genera la empresa por cada peso invertido en activos totales.","razonamiento":"El ROA muestra la eficiencia con que la gerencia utiliza todos los activos para generar ganancias, independiente de cómo se financiaron.","relevancia":"Especialmente útil para comparar empresas del mismo sector. Un ROA bajo puede indicar activos sobreinvertidos o improductivos.","formula":"ROA = (Utilidad Neta / Activos Totales) × 100","metricasRelacionadas":["roe","roic","asset_turnover"]},"evaluacion":[{"nivel":"Retorno sobresaliente","color":"#3B82F6","threshold":"15% o más","description":"Activos extremadamente productivos. Típico de asset-light companies."},{"nivel":"Retorno sólido","color":"#10B981","threshold":"8% - 15%","description":"Buena productividad de activos."},{"nivel":"Retorno aceptable","color":"#F59E0B","threshold":"4% - 8%","description":"Nivel promedio. Hay oportunidades para mejorar productividad."},{"nivel":"Retorno bajo","color":"#F97316","threshold":"2% - 4%","description":"Activos generan poco retorno. Posible sobreinversión."},{"nivel":"Retorno muy bajo","color":"#EF4444","threshold":"Menos de 2%","description":"Los activos no están generando valor adecuado."}],"bestPerformers":[{"name":"Software","icon":"Monitor"},{"name":"Consult rent_ratio"]},"evaluacion":[{"nivel":"Cobranza sobresaliente","color":"#3B82F6","threshold":"Menos de 30 días","description":"Excelente gestión de cobranza. Liquidez alta."},{"nivel":"Cobranza sólida","color":"#10B981","threshold":"30 - 45 días","description":"Buen control de cartera. Dentro de estándares de mercado."},{"nivel":"Cobranza aceptable","color":"#F59E0B","threshold":"45 - 60 días","description":"Nivel estándar, pero hay oportunidad de mejora."},{"nivel":"Cobranza lenta","color":"#F97316","threshold":"60 - 90 días","description":"Capital de trabajo atrapado. Revisar políticas de crédito."},{"nivel":"Cobranza crítica","color":"#EF4444","threshold":"Más de 90 días","description":"Riesgo alto de cartera vencida e incobrable."}],"bestPerformers":[{"name":"Retail","icon":"ShoppingCart"},{"name":"E-commerce","icon":"Monitor"},{"name":"Restaurantes","icon":"UtensilsCrossed"},{"name":"Suscripciones","icon":"RefreshCw"},{"name":"SaaS","icon":"Cloud"}],"worstPerformers":[{"name":"Construcción","icon":"HardHat"},{"name":"Gobierno","icon":"Landmark"},{"name":"Manufactura","icon":"Factory"},{"name":"Servicios Prof.","icon":"Briefcase"},{"name":"Healthcare","icon":"HeartPulse"}],"quote":{"text":"Una venta no está completa hasta que el dinero está en el banco.","author":"Jack Welch","company":"General Electric"},"comoMejorar":["Implementar descuentos por pronto pago","Automatizar el proceso de cobranza","Revisar y endurecer políticas de crédito","Facturar inmediatamente al entregar","Usar factoraje para convertir CxC en efectivo"]},{"key":"dpo","category":"efficiency","name":"DPO","englishName":"Days Payable Outstanding","question":"¿Cuántos días tardamos en pagar a proveedores?","frequency":"Mensual | Trimestral","alternativeNames":"DPO / Días de Pago / Days Payable Outstanding / Período de Pago","sections":{"queMide":"Mide el número promedio de días que tarda la empresa en pagar a sus proveedores.","razonamiento":"Un DPO alto puede ser positivo (financiamiento gratuito de proveedores) o negativo (demora en pagos que daña relaciones). El equilibrio es clave.","relevancia":"Junto con DSO y DIO, determina el Ciclo de Conversión de Efectivo. Un DPO mayor al DSO significa que los proveedores financian parte de la operación.","formula":"DPO = (Cuentas por Pagar × 30) / Costo de Ventas Mensual\n\nO en base anual:\nDPO = (CxP / Costo Ventas Anual) × 365","metricasRelacionadas":["dso","cash_conversion_cycle","current_ratio"]},"evaluacion":[{"nivel":"Gestión estratégica","color":"#3B82F6","threshold":"60 - 90 días","description":"Maximiza financiamiento de proveedores sin dañar relaciones."},{"nivel":"Gestión sólida","color":"#10B981","threshold":"45 - 60 días","description":"Buen equilibrio entre pago y uso del dinero."},{"nivel":"Gestión estándar","color":"#F59E0B","threshold":"30 - 45 días","description":"Período de pago típico en el mercado."},{"nivel":"Pago rápido","color":"#F97316","threshold":"15 - 30 días","description":"Se paga rápido, reduciendo la ventaja de financiamiento."},{"nivel":"Pago inmediato","color":"#EF4444","threshold":"Menos de 15 días","description":"Se pierde la oportunidad de usar el dinero de proveedores."}],"bestPerformers":[{"name":"Retail Grande","icon":"ShoppingCart"},{"name":"Automotriz","icon":"Car"},{"name":"Telecomunicaciones","icon":"Radio"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Gobierno","icon":"Landmark"}],"worstPerformers":[{"name":"Startups","icon":"Rocket"},{"name":"PYMES","icon":"Store"},{"name":"Servicios","icon":"Users"},{"name":"Agricultura","icon":"Wheat"},{"name":"Construcción","icon":"HardHat"}],"quote":{"text":"El capital de trabajo es el oxígeno del negocio. Maneja tus días de pago inteligentemente.","author":"Jamie Dimon","company":"JPMorgan Chase"},"comoMejorar":["Negociar plazos más largos con proveedores","Centralizar la gestión de pagos","Usar líneas de crédito revolvente","Priorizar pagos por impacto en el negocio","Implementar pagos programados estratégicamente"]},{"key":"cash_conversion_cycle","category":"efficiency","name":"Ciclo de Conversión de Efectivo","englishName":"Cash Conversion Cycle","question":"¿Cuántos días tarda el dinero en dar la vuelta completa?","frequency":"Mensual | Trimestral","alternativeNames":"CCC / Ciclo de Conversión de Efectivo / Cash Conversion Cycle","sections":{"queMide":"Mide el número total de días que tarda la empresa desde que invierte dinero (compra a proveedores) hasta que lo recupera (cobra a clientes).","razonamiento":"Un CCC corto o negativo es ideal: significa que la empresa cobra antes de tener que pagar. Un CCC largo indica capital de trabajo atrapado en el ciclo operativo.","relevancia":"Es la métrica integral de eficiencia del capital de trabajo. Empresas como Amazon o Dell operan con CCC negativo, lo que les da enorme ventaja financiera.","formula":"CCC = DSO + DIO - DPO\n\nDonde:\n• DSO = Días de cobro\n• DIO = Días de inventario\n• DPO = Días de pago","metricasRelacionadas":["dso","dpo","working_capital"]},"evaluacion":[{"nivel":"Eficiencia excepcional","color":"#3B82F6","threshold":"Negativo","description":"La empresa se financia con proveedores y clientes. Ventaja competitiva enorme."},{"nivel":"Eficiencia sólida","color":"#10B981","threshold":"0 - 30 días","description":"Ciclo corto. Buen manejo del capital de trabajo."},{"nivel":"Eficiencia aceptable","color":"#F59E0B","threshold":"30 - 60 días","description":"Nivel estándar. Capital de trabajo moderado."},{"nivel":"Ciclo largo","color":"#F97316","threshold":"60 - 120 días","description":"Mucho capital atrapado en el ciclo operativo."},{"nivel":"Ciclo crítico","color":"#EF4444","threshold":"Más de 120 días","description":"Riesgo de problemas de liquidez severos."}],"bestPerformers":[{"name":"E-commerce","icon":"Monitor"},{"name":"Suscripciones","icon":"RefreshCw"},{"name":"Retail","icon":"ShoppingCart"},{"name":"Software","icon":"Code"},{"name":"Fast Food","icon":"UtensilsCrossed"}],"worstPerformers":[{"name":"Construcción","icon":"HardHat"},{"name":"Manufactura","icon":"Factory"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Maquinaria","icon":"Cog"},{"name":"Aeroespacial","icon":"Plane"}],"quote":{"text":"Nuestro modelo de negocio con ciclo de caja negativo nos permite crecer sin necesitar financiamiento externo.","author":"Jeff Bezos","company":"Amazon"},"comoMejorar":["Reducir DSO (cobrar más rápido)","Reducir DIO (menos inventario)","Incrementar DPO (negociar más plazo)","Implementar just-in-time en inventarios","Automatizar procesos de facturación y cobranza"]},{"key":"current_ratio","category":"liquidity","name":"Razón Circulante","englishName":"Current Ratio","question":"¿Podemos pagar nuestras deudas de corto plazo?","frequency":"Mensual | Trimestral","alternativeNames":"Razón Circulante / Current Ratio / Razón Corriente","sections":{"queMide":"Mide la capacidad de la empresa para pagar sus obligaciones de corto plazo con sus activos de corto plazo.","razonamiento":"Una razón mayor a 1 indica que hay más activos circulantes que pasivos circulantes. Menos de 1 es señal de alerta de posible insolvencia a corto plazo.","relevancia":"Es el indicador de liquidez más básico y ampliamente usado. Bancos y acreedores lo revisan antes de otorgar crédito.","formula":"Razón Circulante = Activo Circulante / Pasivo Circulante","metricasRelacionadas":["quick_ratio","cash_ratio","working_capital"]},"evaluacion":[{"nivel":"Liquidez sobresaliente","color":"#3B82F6","threshold":"3.0x o más","description":"Alta liquidez. Posible capital ocioso que podría invertirse."},{"nivel":"Liquidez sólida","color":"#10B981","threshold":"2.0x - 3.0x","description":"Buena capacidad de pago con margen de seguridad."},{"nivel":"Liquidez aceptable","color":"#F59E0B","threshold":"1.5x - 2.0x","description":"Nivel estándar y saludable."},{"nivel":"Liquidez ajustada","color":"#F97316","threshold":"1.0x - 1.5x","description":"Capacidad limitada. Monitorear de cerca."},{"nivel":"Liquidez crítica","color":"#EF4444","thre sivo Circulante","metricasRelacionadas":["current_ratio","quick_ratio","working_capital"]},"evaluacion":[{"nivel":"Liquidez sobresaliente","color":"#3B82F6","threshold":"1.0x o más","description":"Puede pagar toda la deuda de corto plazo con efectivo."},{"nivel":"Liquidez sólida","color":"#10B981","threshold":"0.5x - 1.0x","description":"Buena posición de efectivo."},{"nivel":"Liquidez aceptable","color":"#F59E0B","threshold":"0.2x - 0.5x","description":"Nivel adecuado para operación normal."},{"nivel":"Liquidez ajustada","color":"#F97316","threshold":"0.1x - 0.2x","description":"Poco efectivo disponible. Depende de cobranza."},{"nivel":"Liquidez crítica","color":"#EF4444","threshold":"Menos de 0.1x","description":"Riesgo alto de problemas de caja inmediatos."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Software","icon":"Monitor"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Finanzas","icon":"Landmark"},{"name":"Energía","icon":"Zap"}],"worstPerformers":[{"name":"Aerolíneas","icon":"Plane"},{"name":"Restaurantes","icon":"UtensilsCrossed"},{"name":"Retail","icon":"ShoppingCart"},{"name":"Construcción","icon":"HardHat"},{"name":"Agricultura","icon":"Wheat"}],"quote":{"text":"Cash is king. Nunca lo olvides.","author":"Pehr Gyllenhammar","company":"Volvo"},"comoMejorar":["Mejorar generación de efectivo operativo","Reducir gastos de capital innecesarios","Obtener líneas de crédito como respaldo","Negociar mejores términos con proveedores","Implementar pronósticos de flujo de efectivo semanales"]},{"key":"working_capital","category":"liquidity","name":"Capital de Trabajo","englishName":"Working Capital","question":"¿Cuántos recursos tenemos para operar día a día?","frequency":"Mensual","alternativeNames":"Capital de Trabajo / Working Capital / Capital Neto de Trabajo","sections":{"queMide":"Mide los recursos financieros disponibles para las operaciones diarias de la empresa después de cubrir las obligaciones de corto plazo.","razonamiento":"Un capital de trabajo positivo indica que la empresa puede financiar sus operaciones y crecer. Negativo indica dependencia de financiamiento externo para operar.","relevancia":"Es el \"colchón financiero\" del negocio. Empresas con capital de trabajo negativo persistente están en riesgo de crisis de liquidez.","formula":"Capital de Trabajo = Activo Circulante - Pasivo Circulante","metricasRelacionadas":["current_ratio","cash_conversion_cycle","cash_ratio"]},"evaluacion":[{"nivel":"CT sobresaliente","color":"#3B82F6","threshold":"Muy positivo (>30% activos)","description":"Amplio colchón financiero. Empresa muy sólida."},{"nivel":"CT sólido","color":"#10B981","threshold":"Positivo (15-30% activos)","description":"Buen margen para operar y crecer."},{"nivel":"CT aceptable","color":"#F59E0B","threshold":"Positivo (5-15% activos)","description":"Suficiente para operación normal."},{"nivel":"CT ajustado","color":"#F97316","threshold":"Cercano a cero","description":"Muy poco margen. Cualquier imprevisto puede causar problemas."},{"nivel":"CT negativo","color":"#EF4444","threshold":"Negativo","description":"La empresa no puede cubrir sus obligaciones de corto plazo con activos corrientes."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Software","icon":"Monitor"},{"name":"Minería","icon":"Mountain"},{"name":"Energía","icon":"Zap"}],"worstPerformers":[{"name":"Aerolíneas","icon":"Plane"},{"name":"Restaurantes","icon":"UtensilsCrossed"},{"name":"Hotelería","icon":"Hotel"},{"name":"Startups","icon":"Rocket"},{"name":"Construcción","icon":"HardHat"}],"quote":{"text":"Una empresa puede sobrevivir años sin utilidades, pero no sobrevive un mes sin capital de trabajo.","author":"Aswath Damodaran","company":"NYU Stern"},"comoMejorar":["Cobrar más rápido (reducir CxC)","Reducir inventarios excesivos","Negociar plazos más largos con proveedores","Refinanciar deuda de corto a largo plazo","Inyectar capital o retener utilidades"]},{"key":"debt_to_equity","category":"solvency","name":"Deuda / Capital","englishName":"Debt to Equity","question":"¿Cuánto nos financiamos con deuda vs capital propio?","frequency":"Trimestral | Anual","alternativeNames":"Razón Deuda/Capital / Debt to Equity Ratio / Leverage Ratio","sections":{"queMide":"Mide la proporción de financiamiento con deuda respecto al capital de los accionistas.","razonamiento":"Una razón alta indica mayor riesgo financiero (más deuda). Una razón baja puede indicar que no se está aprovechando el apalancamiento positivo.","relevancia":"Indicador clave de la estructura de capital. Bancos lo usan como covenant principal en contratos de crédito.","formula":"D/E = Deuda Total / Capital Contable","metricasRelacionadas":["debt_to_assets","interest_coverage","equity_ratio"]},"evaluacion":[{"nivel":"Estructura conservadora","color":"#3B82F6","threshold":"Menos de 0.5x","description":"Baja deuda. Empresa muy conservadora en su financiamiento."},{"nivel":"Estructura equilibrada","color":"#10B981","threshold":"0.5x - 1.0x","description":"Buen balance entre deuda y capital propio."},{"nivel":"Estructura aceptable","color":"#F59E0B","threshold":"1.0x - 2.0x","description":"Nivel de deuda manejable pero monitoreable."},{"nivel":"Apalancamiento alto","color":"#F97316","threshold":"2.0x - 3.0x","description":"Alta dependencia de deuda. Mayor riesgo financiero."},{"nivel":"Apalancamiento crítico","color":"#EF4444","threshold":"Más de 3.0x","description":"Sobreendeudamiento. Riesgo de insolvencia."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Software","icon":"Monitor"},{"name":"Consultoría","icon":"Briefcase"},{"name":"Servicios","icon":"Users"},{"name":"Consumo","icon":"Package"}],"worstPerformers":[{"name":"Aerolíneas","icon":"Plane"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Utilities","icon":"Zap"},{"name":"Telecomunicaciones","icon":"Radio"},{"name":"Bancos","icon":"Landmark"}],"quote":{"text":"El apalancamiento es un arma de doble filo: magnifica las ganancias y también las pérdidas.","author":"Warren Buffett","company":"Berkshire Hathaway"},"comoMejorar":["Pagar deuda con flujo operativo","Capitalizar utilidades retenidas","Buscar inversionistas de equity","Refinanciar deuda a mejores condiciones","Vender activos no estratégicos para reducir deuda"]},{"key":"debt_to_assets","category":"solvency","name":"Deuda / Activos","englishName":"Debt to Assets","question":"¿Qué porcentaje de nuestros activos está financiado con deuda?","frequency":"Trimestral | Anual","alternativeNames":"Razón Deuda/Activos / Debt to Assets Ratio","sections":{"queMide":"Mide el porcentaje de activos totales que están financiados con pasivos (deuda).","razonamiento":"Indica qué tanto de los activos le pertenecen realmente a los acreedores. Un ratio alto significa que en caso de liquidación, los acreedores tienen mayor reclamo.","relevancia":"Indicador importante de solvencia a largo plazo. Útil para entender la vulnerabilidad de la empresa ante caídas de ingresos.","formula":"Deuda/Activos = (Pasivo Total / Activos Totales) × 100","metricasRelacionadas":["debt_to_equity","equity_ratio","interest_coverage"]},"evaluacion":[{"nivel":"Solvencia sobresaliente","color":"#3B82F6","threshold":"Menos de 30%","description":"Empresa poco endeudada. Alta solidez patrimonial."},{"nivel":"Solvencia sólida","color":"#10B981","threshold":"30% - 50%","description":"Estructura de capital equilibrada."},{"nivel":"Solvencia aceptable","color":"#F59E0B","threshold":"50% - 60%","description":"Nivel estándar para muchas industrias."},{"nivel":"Endeudamiento alto","color":"#F97316","threshold":"60% - 75%","description":"Mayoría de activos financiados con deuda."},{"nivel":"Endeudamiento crítico","color":"#EF4444","threshold":"Más de 75%","description":"Muy alta dependencia de deuda. Riesgo sistémico."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Software","icon":"Monitor"},{"name":"Servicios","icon":"Users"},{"name":"Consumo","icon":"Package"},{"name":"Farmacéutica","icon":"Pill"}],"worstPerformers":[{"name":"Bancos","icon":"Landmark"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Utilities","icon":"Zap"},{"name":"Aerolíneas","icon":"Plane"},{"name":"Telecomunicaciones","icon":"Radio"}],"quote":{"text":"Los activos que no son tuyos no te protegen en una crisis.","author":"Howard Marks","company":"Oaktree Capital"},"comoMejorar":["Reducir deuda total pagando con flujo operativo","Aumentar capital contable con utilidades retenidas","Reestructurar deuda para mejorar términos","Ser selectivo con nuevas inversiones en activos","Vender activos para pagar deuda"]},{"key":"interest_coverage","category":"solvency","name":"Cobertura de Intereses","englishName":"Interest Coverage Ratio","question":"¿Cuántas veces podemos pagar los intereses de nuestra deuda?","frequency":"Trimestral | Anual","alternativeNames":"Cobertura de Intereses / Interest Coverage / Times Interest Earned","sections":{"queMide":"Mide cuántas veces la empresa puede cubrir sus pagos de intereses con su utilidad operativa (EBITDA).","razonamiento":"Si la cobertura es menor a 1, la empresa no genera suficiente para pagar intereses, lo que es insostenible. Mayor cobertura significa menor riesgo de impago.","relevancia":"Es el indicador más importante para acreedores y agencias de calificación. Determina la calidad crediticia y el acceso a financiamiento.","formula":"Cobertura = EBITDA / Intereses\n\nAlternativa: EBIT / Intereses","metricasRelacionadas":["debt_to_equity","debt_to_ebitda","debt_to_assets"]},"evaluacion":[{"nivel":"Cobertura sobresaliente","color":"#3B82F6","threshold":"10x o más","description":"Los intereses son irrelevantes para la operación. Máxima seguridad crediticia."},{"nivel":"Cobertura sólida","color":"#10B981","threshold":"5x - 10x","description":"Amplio margen para pagar intereses. Grado de inversión."},{"nivel":"Cobertura aceptable","color":"#F59E0B","threshold":"3x - 5x","description":"Puede cubrir intereses cómodamente pero sin mucho margen."},{"nivel":"Cobertura ajustada","color":"#F97316","threshold":"1.5x - 3x","description":"Poco margen. Una caída en EBITDA puede comprometer el pago."},{"nivel":"Cobertura crítica","color":"#EF4444","threshold":"Menos de 1.5x","description":"Riesgo alto de no poder servir la deuda. Señal de alarma."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Software","icon":"Monitor"},{"name":"Consultoría","icon":"Briefcase"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Consumo","icon":"Package"}],"worstPerformers":[{"name":"Aerolíneas","icon":"Plane"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Utilities","icon":"Zap"},{"name":"Telecomunicaciones","icon":"Radio"},{"name":"Construcción","icon":"HardHat"}],"quote":{"text":"No importa cuánto ganes si no puedes pagar tus intereses. La deuda es implacable.","author":"Benjamin Graham","company":"Graham-Newman Corp."},"comoMejorar":["Incrementar EBITDA (mejorar operación)","Refinanciar deuda a tasas más bajas","Reducir deuda total","Prepagar deuda más cara primero","Diversificar fuentes de financiamiento"]},{"key":"equity_ratio","category":"solvency","name":"Razón de Capital","englishName":"Equity Ratio","question":"¿Qué porcentaje de activos es financiado por los dueños?","frequency":"Trimestral | Anual","alternativeNames":"Razón de Capital / Equity Ratio / Razón de Patrimonio","sections":{"queMide":"Mide el porcentaje de activos totales financiado con capital de los accionistas (sin deuda).","razonamiento":"Es el complemento de Deuda/Activos. Un ratio alto indica independencia financiera. Un ratio bajo indica dependencia de acreedores.","relevancia":"Indicador de solidez patrimonial y autonomía financiera. Empresas con alto equity ratio tienen mayor resistencia a crisis.","formula":"Razón de Capital = (Capital Contable / Activos Totales) × 100","metricasRelacionadas":["debt_to_equity","debt_to_assets","interest_coverage"]},"evaluacion":[{"nivel":"Independencia financiera","color":"#3B82F6","threshold":"70% o más","description":"Alta autonomía. Los accionistas financian la mayoría de los activos."},{"nivel":"Solidez patrimonial","color":"#10B981","threshold":"50% - 70%","description":"Más de la mitad de activos financiados con capital propio."},{"nivel":"Estructura aceptable","color":"#F59E0B","threshold":"40% - 50%","description":"Equilibrio razonable entre deuda y capital."},{"nivel":"Dependencia de deuda","color":"#F97316","threshold":"25% - 40%","description":"Mayor dependencia de acreedores."},{"nivel":"Autonomía crítica","color":"#EF4444","threshold":"Menos de 25%","description":"Los acreedores controlan más del 75% de los activos. Muy vulnerable."}],"bestPerformers":[{"name":"Tecnología","icon":"Cpu"},{"name":"Software","icon":"Monitor"},{"name":"Servicios","icon":"Users"},{"name":"Farmacéutica","icon":"Pill"},{"name":"Consumo","icon":"Package"}],"worstPerformers":[{"name":"Bancos","icon":"Landmark"},{"name":"Inmobiliario","icon":"Building2"},{"name":"Utilities","icon":"Zap"},{"name":"Aerolíneas","icon":"Plane"},{"name":"Telecomunicaciones","icon":"Radio"}],"quote":{"text":"La verdadera riqueza se construye con capital propio, no con deuda.","author":"Dave Ramsey","company":"Ramsey Solutions"},"comoMejorar":["Retener y reinvertir utilidades","Reducir deuda progresivamente","Atraer nuevos inversionistas de capital","Evitar sobre-endeudamiento para expansión","Priorizar crecimiento orgánico sobre apalancado"]},

{"key":"dio","category":"efficiency","name":"DIO (Días de Inventario)","englishName":"Days Inventory Outstanding","question":"¿Cuántos días tarda el inventario en venderse?","frequency":"Mensual | Trimestral","alternativeNames":"DIO / Días de Inventario / Days Inventory Outstanding / Rotación de Inventarios (en días)","sections":{"queMide":"Mide el número promedio de días que la mercancía permanece en el almacén antes de venderse.","razonamiento":"Cada día de inventario es dinero inmovilizado que además genera costos de almacenaje, merma y obsolescencia. Menos días = capital de trabajo más ligero.","relevancia":"Es el tercer componente del Ciclo de Conversión de Efectivo (CCC = DSO + DIO - DPO). En comercios y manufactura suele ser la palanca más grande de liquidez.","formula":"DIO = (Inventario Promedio / Costo de Ventas) × 365\n\nDonde:\n• Inventario Promedio = (Inventario inicial + final) / 2","metricasRelacionadas":["cash_conversion_cycle","dso","dpo"]},"evaluacion":[{"nivel":"Rotación sobresaliente","color":"#3B82F6","threshold":"Menos de 30 días","description":"Inventario muy ágil. Capital de trabajo mínimo inmovilizado."},{"nivel":"Rotación sólida","color":"#10B981","threshold":"30 - 60 días","description":"Buen equilibrio entre disponibilidad y costo de almacenaje."},{"nivel":"Rotación aceptable","color":"#F59E0B","threshold":"60 - 90 días","description":"Nivel típico en manufactura. Revisar productos de baja rotación."},{"nivel":"Rotación lenta","color":"#F97316","threshold":"90 - 120 días","description":"Exceso de inventario. Riesgo de obsolescencia y merma."},{"nivel":"Rotación crítica","color":"#EF4444","threshold":"Más de 120 días","description":"Capital atrapado en el almacén. Liquidar y replantear compras."}],"bestPerformers":[{"name":"Supermercado","icon":"ShoppingCart"},{"name":"Restaurantes","icon":"UtensilsCrossed"},{"name":"E-commerce","icon":"Monitor"},{"name":"Perecederos","icon":"Package"}],"worstPerformers":[{"name":"Joyería","icon":"Gem"},{" // ===== BIBLIOTECA DE MÉTRICAS FINANCIERAS (enciclopedia TaxnFin) =====
var MET_SEL=null;
async function vMetricas(m){
  await loadFx();
  var y0=new Date(new Date().getFullYear(),0,1).toISOString();
  var d90=new Date();d90.setDate(d90.getDate()-90);
  var res=await Promise.all([
    sb.from('cfdis').select('direction,total,moneda,category_id,status_pago,fecha_emision,tipo_comprobante,estado').neq('estado','cancelado').gte('fecha_emision',y0).limit(10000),
    sb.from('categories').select('id,grupo,parent_id'),
    sb.from('bank_accounts').select('balance,currency')
  ]);
  var cfdis=(res[0].data||[]).filter(function(c){return String(c.tipo_comprobante||'I').toUpperCase()==='I';});
  var cats=res[1].data||[], accts=res[2].data||[];
  var catById={};cats.forEach(function(c){catById[c.id]=c;});
  var grupoDe=function(cid){var c=cid?catById[cid]:null;if(c&&c.parent_id&&catById[c.parent_id])c=catById[c.parent_id];return c?c.grupo:'sga';};
  var bank=accts.reduce(function(a,c){return a+toMXN(c.balance,c.currency);},0);
  var ing=0,cogs=0,sga=0,cxc=0,cxp=0,ventas90=0,compras90=0,egPag4=0,ingPag4=0;
  var w4=new Date();w4.setDate(w4.getDate()-28);
  cfdis.forEach(function(c){
    var mxn=toMXN(c.total,c.moneda);if(!mxn)return;
    var fe=new Date(c.fecha_emision);
    if(c.direction==='emitida'){
      ing+=mxn;if(fe>=d90)ventas90+=mxn;
      if(c.status_pago==='pendiente')cxc+=mxn;
      if(c.status_pago==='pagado'&&fe>=w4)ingPag4+=mxn;
    }else{
      if(grupoDe(c.category_id)==='cogs')cogs+=mxn;else sga+=mxn;
      if(fe>=d90)compras90+=mxn;
      if(c.status_pago==='pendiente')cxp+=mxn;
      if(c.status_pago==='pagado'&&fe>=w4)egPag4+=mxn;
    }
  });
  var burn=egPag4/4, netBurn=burn-(ingPag4/4);
  var dso=ventas90>0?cxc/ventas90*90:null, dpo=compras90>0?cxp/compras90*90:null;
  // Valor en vivo por métrica (donde el dato lo permite)
  var LIVE={
    gross_margin:[ing>0?(ing-cogs)/ing*100:null,'%'],
    ebitda_margin:[ing>0?(ing-cogs-sga)/ing*100:null,'%'],
    operating_margin:[ing>0?(ing-cogs-sga)/ing*100:null,'%'],
    dso:[dso,' días'],
    dpo:[dpo,' días'],
    cash_conversion_cycle:[(dso!==null&&dpo!==null)?dso-dpo:null,' días'],
    cash_ratio:[cxp>0?bank/cxp:null,'x'],
    working_capital:[bank+cxc-cxp,'$'],
    runway:[netBurn>0?bank/netBurn:null,' sem']
  };
  function liveVal(key){
    var lv=LIVE[key];if(!lv||lv[0]===null||lv[0]===undefined)return null;
    var v=lv[0],s=lv[1];
    if(s==='$')return fmt(v);
    if(s==='%')return v.toFixed(1)+'%';
    if(s==='x')return v.toFixed(2)+'x';
    return v.toFixed(1)+s;
  }
  var D=METRICS_DATA;
  if(!MET_SEL)MET_SEL=D.metrics[0].key;
  var cur=D.metrics.find(function(x){return x.key===MET_SEL;})||D.metrics[0];
  var catColor=function(k){var c=D.categories.find(function(x){return x.key===k;});return c?c.color:'#39c6a3';};

  var nav='';
  D.categories.forEach(function(cat){
    nav+='<div style="padding:8px 10px;font-size:11px;letter-spacing:.08em;font-weight:700;color:'+cat.color+';background:color-mix(in srgb,'+cat.color+' 10%, transparent);border-radius:8px;margin:10px 0 4px">'+cat.label.toUpperCase()+'</div>';
    D.metrics.filter(function(mt){return mt.category===cat.key;}).forEach(function(mt){
      var on=mt.key===MET_SEL;
      nav+='<a class="nav enc-item" data-met="'+mt.key+'" style="display:flex;justify-content:space-between;align-items:center;gap:8px;'+(on?'background:color-mix(in srgb,'+cat.color+' 16%, var(--panel));color:var(--text);font-weight:600;border-left:3px solid '+cat.color+';':'')+'"><span>'+esc(mt.name)+'</span>'+(liveVal(mt.key)?'<span class="muted" style="font-size:11px;white-space:nowrap">'+liveVal(mt.key)+'</span>':'')+'</a>';
    });
  });

  var col=catColor(cur.category);
  var lv=liveVal(cur.key);
  var det='<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">'+
    '<div><h1 style="margin-bottom:2px">'+esc(cur.name)+'</h1><span class="muted">'+esc(cur.englishName||'')+'</span></div>'+
    (lv?'<div class="card" style="border-left:3px solid '+col+';padding:10px 16px"><div class="k">Tu valor actual</div><div class="v" style="color:'+col+'">'+lv+'</div></div>':'')+
    '</div>'+
    '<div class="card" style="border-left:3px solid '+col+';margin:12px 0">'+
    '<b style="color:'+col+'">'+esc(cur.question||'')+'</b>'+
    '<p class="muted" style="margin-top:6px">🕐 '+esc(cur.frequency||'')+'</p>'+
    '<p class="muted" style="font-style:italic">'+esc(cur.alternativeNames||'')+'</p></div>';

  var sec=cur.sections||{};
  var block=function(t,body,pre){return '<div class="card" style="margin-bottom:12px"><b>'+t+'</b><'+(pre?'pre style="white-space:pre-wrap;font-family:monospace;font-size:13px;color:var(--dim);margin-top:8px"':'p class="muted" style="margin-top:8px;line-height:1.6"')+'>'+esc(body)+(pre?'</pre>':'</p>')+'</div>';};
  if(sec.queMide)det+=block('❓ ¿Qué mide?',sec.queMide);
  if(sec.razonamiento)det+=block('💡 Razonamiento',sec.razonamiento);
  if(sec.relevancia)det+=block('⭐ Relevancia',sec.relevancia);
  if(sec.formula)det+=block('🧮 Fórmula',sec.formula,true);

  if(cur.evaluacion&&cur.evaluacion.length){
    det+='<div class="card" style="margin-bottom:12px"><b>Evaluación de métrica</b>';
    cur.evaluacion.forEach(function(ev){
      det+='<div style="display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--line);padding:9px 0">'+
        '<span style="width:12px;height:12px;border-radius:50%;background:'+ev.color+';flex-shrink:0;margin-top:4px"></span>'+
        '<div><b style="font-size:14px">'+esc(ev.nivel)+'</b> <span class="badge" style="margin-left:6px">'+esc(ev.threshold)+'</span><p class="muted" style="margin-top:3px">'+esc(ev.description)+'</p></div></div>';
    });
    det+='</div>';
  }
  var chips=function(t,arr,good){
    if(!arr||!arr.length)return '';
    var s='<div class="card" style="margin-bottom:12px"><b>'+t+'</b><div style="margin-top:8px">';
    arr.forEach(function(p){s+='<span class="chip" style="cursor:default;border-color:'+(good?'var(--acc)':'var(--red)')+'">'+esc(p.name)+'</span>';});
    return s+'</div></div>';
  };
  det+=chips('📈 Best performers — industrias donde esta métrica brilla',cur.bestPerformers,true);
  det+=chips('📉 Worst performers',cur.worstPerformers,false);
  if(cur.quote&&cur.quote.text)det+='<div class="card" style="margin-bottom:12px;border-left:3px solid '+col+'"><p style="font-style:italic;line-height:1.6">“'+esc(cur.quote.text)+'”</p><p class="muted" style="margin-top:6px">— '+esc(cur.quote.author)+(cur.quote.company?', '+esc(cur.quote.company):'')+'</p></div>';
  if(cur.comoMejorar&&cur.comoMejorar.length){
    det+='<div class="card" style="margin-bottom:12px"><b>🛠️ Cómo mejorarla</b>';
    cur.comoMejorar.forEach(function(t){det+='<p class="muted" style="margin-top:6px">• '+esc(t)+'</p>';});
    det+='</div>';
  }
  if(sec.metricasRelacionadas&&sec.metricasRelacionadas.length){
    det+='<div class="card"><b>🔗 Métricas relacionadas</b><div style="margin-top:8px">';
    sec.metricasRelacionadas.forEach(function(k){
      var rm=D.metrics.find(function(x){return x.key===k;});
      if(rm)det+='<span class="chip" data-met="'+k+'">'+esc(rm.name)+'</span>';
    });
    det+='</div></div>';
  }

  m.innerHTML='<div style="display:flex;gap:18px;align-items:flex-start">'+
    '<div style="width:255px;flex-shrink:0;position:sticky;top:10px">'+nav+'</div>'+
    '<div style="flex:1;min-width:0">'+det+'</div></div>';

  function share5(mm){var v=Object.values(mm).sort(function(a,b){return b-a;});var t=v.reduce(function(a,b){return a+b;},0);if(!t)return[null,null];var top5=v.slice(0,5).reduce(function(a,b){return a+b;},0);var hhi=v.reduce(function(a,b){return a+Math.pow(b/t,2);},0);return[top5/t*100,hhi];}

  // --- métricas por año ---
  var years={};
  all.forEach(function(c){

    var mkY=function(k){return years[k]=years[k]||{rev:0,exp:0,nInv:0,nRecv:0,nCanc:0,vCanc:0,nom:0,cob:0,pag:0,cli:{},prov:{},dsoSum:0,dsoN:0};};

    }

      if(c.fecha_pago&&c.fecha_emision){var dd=(new Date(c.fecha_pago)-new Date(c.fecha_emision))/864e5;if(dd>=0&&dd<365){Y.dsoSum+=dd;Y.dsoN++;}}
    }else{
      Y.exp+=mxn;Y.nRecv++;var p=c.rfc_emisor||'—';Y.prov[p]=(Y.prov[p]||0)+mxn;
      if(/n[oó]mina|imss|infonavit|sueldo|salario/i.test(catInfo(c.category_id).nombre))Y.nom+=mxn;
    }
  });
  var yrs=Object.keys(years).sort();

  // --- score compuesto (300-850) sobre ventana de 12 meses ---
  function scoreAt(end){ // end: Date fin de ventana
    var ini=new Date(end);ini.setFullYear(ini.getFullYear()-1);
    var rev=0,exp=0,cli={},cxc=0,dsoSum=0,dsoN=0;
    all.forEach(function(c){

      var mxn=toMXN(c.total,c.moneda)||0;

        if(c.fecha_pago){var dd=(new Date(c.fecha_pago)-f)/864e5;if(dd>=0&&dd<365){dsoSum+=dd;dsoN++;}}
      }else exp+=mxn;

  h+='<h2>🔀 Otras vías de financiamiento <span class="muted" style="font-weight:400">— alternativas al crédito simple</span></h2><div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(260px,1fr))">';

  function setSim(monto,tasa,plazo){

    }
    var viab,vMsg,score2;
    if(prom<=0){viab='no_viable';vMsg='Tu flujo actual no soporta pagos adicionales';score2=0;}
    else if(cuotaSem>prom*0.5){viab='riesgo_alto';vMsg='La cuota representa más del 50% de tu flujo promedio';score2=40;}
    else if(cuotaSem>prom*0.3){viab='riesgo_medio';vMsg='La cuota es manejable pero ajustada';score2=70;}
    else{viab='viable';vMsg='Tu flujo soporta cómodamente este crédito';score2=95;}
    var vCol=score2>=90?'var(--acc)':score2>=70?'#d9a13b':'var(--red)';
    var cobertura=cuotaSem>0?(prom/cuotaSem*100):0;
    var pct=prom>0?(cuotaSem/prom*100).toFixed(0)+'%':'N/A';
    var analisis=(score2>=70?'Crédito viable. ':'Crédito de alto riesgo. ')+
      'La cuota mensual de '+fmt(cuota)+' equivale al '+pct+' de tu flujo semanal promedio. '+
      (crit>0?crit+' de '+fut.length+' semanas proyectadas quedarían en flujo negativo. ':'Ninguna semana proyectada queda en negativo. ')+
      'Costo financiero: '+fmt(intereses)+' de intereses'+(ivaInt?' + '+fmt(ivaInt)+' de IVA (deducible)':'')+'.';
    function rcard(t,v,sub){return '<div class="card"><div class="k">'+t+'</div><div class="v knum" style="font-size:20px">'+v+'</div><div class="muted" style="font-size:11px">'+sub+'</div></div>';}
    var rh='<div class="alerta" style="border-left-color:'+vCol+';background:color-mix(in srgb,'+vCol+' 8%, transparent)">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px"><div><b style="color:'+vCol+'">⚠ '+vMsg+'</b><br>'+
      '<span class="muted" style="font-size:12px">'+crit+' semanas con flujo negativo · Cobertura: '+cobertura.toFixed(1)+'%</span></div>'+
      '<div style="text-align:right"><span class="knum" style="font-size:30px;font-weight:800;color:'+vCol+'">'+score2+'</span><span class="muted">/100</span></div></div>'+
      '<div style="background:rgba(128,128,128,.18);border-radius:6px;height:7px;margin-top:8px;overflow:hidden"><div style="width:'+score2+'%;height:7px;background:'+vCol+'"></div></div>'+
      '<span class="muted" style="font-size:11px">Score de viabilidad: '+score2+'/100</span></div>';
    rh+='<div class="cards" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))">'+
      rcard('Cuota mensual',fmt(cuota),fmt(cuotaSem)+'/sem')+
      rcard('Total a pagar',fmt(totalPagar),plazo+' meses')+
      rcard('Total intereses',fmt(intereses),(monto?(intereses/monto*100).toFixed(0):0)+'% del monto')+
      rcard('Tasa anual',(tasaA*100).toFixed(1)+'%',(tm*100).toFixed(2)+'% mensual')+
      rcard('CAT aproximado',cat.toFixed(1)+'%','incluye comisiones est.')+
      rcard('IVA sobre intereses (16%)',fmt(ivaInt),'deducible ISR')+
      rcard('Costo total con IVA',fmt(costoTotal),'costo real total')+
      '</div>';
    rh+='<div class="chartbox"><b>↘ Impacto en Cash Flow — próximas semanas</b><div style="max-height:320px;overflow:auto"><table style="margin-top:8px"><thead><tr><th>Semana</th><th style="text-align:right">Flujo sin crédito</th><th style="text-align:right">Cuota</th><th style="text-align:right">Flujo con crédito</th><th>Estado</th></tr></thead><tbody>';
    fut.forEach(function(f){
      var bad=f.con<0;
      rh+='<tr style="'+(bad?'background:rgba(224,99,122,.08)':'')+'"><td>'+f.lbl+'</td>'+
        '<td class="knum" style="text-align:right;color:'+(f.sin<0?'var(--red)':'inherit')+'">'+fmt(f.sin)+'</td>'+
        '<td class="knum" style="text-align:right;color:var(--red)">-'+fmt(cuotaSem).replace('$','$')+'</td>'+
        '<td class="knum" style="text-align:right;color:'+(bad?'var(--red)':'var(--acc)')+'">'+fmt(f.con)+'</td>'+
        '<td><span class="badge '+(bad?'warn':'ok')+'">'+(bad?'Déficit':'OK')+'</span></td></tr>';
    });
    rh+='</tbody></table></div></div>';
    rh+='<div class="alerta" id="fAna" style="border-left-color:'+vCol+'">🧠 <b>Análisis IA — CFO Virtual:</b> '+analisis+' <span class="muted">(generando análisis con IA...)</span></div>';
    rh+='<div class="chartbox"><b style="cursor:pointer" id="fAmToggle">📊 Ver tabla de amortización completa ('+plazo+' meses)</b>'+
      '<div id="fAmBox" style="display:none"><div style="display:flex;justify-content:flex-end"><button class="btn sec" id="fAmPdf">📄 Exportar PDF</button></div>'+
      '<div style="max-height:300px;overflow:auto"><table style="margin-top:8px"><thead><tr><th>Mes</th><th style="text-align:right">Cuota</th><th style="text-align:right">Capital</th><th style="text-align:right">Interés</th><th style="text-align:right">Saldo</th></tr></thead><tbody>';
    tabla.forEach(function(t){rh+='<tr><td>'+t[0]+'</td><td class="knum" style="text-align:right">'+fmt(t[1])+'</td><td class="knum" style="text-align:right;color:var(--acc)">'+fmt(t[2])+'</td><td class="knum" style="text-align:right;color:var(--red)">'+fmt(t[3])+'</td><td class="knum" style="text-align:right">'+fmt(t[4])+'</td></tr>';});
    rh+='</tbody></table></div></div></div>';
    out.innerHTML=rh;
    document.getElementById('fAmToggle').onclick=function(){var b2=document.getElementById('fAmBox');b2.style.display=b2.style.display==='none'?'block':'none';};
    document.getElementById('fAmPdf').onclick=async function(){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js');
      var d=new window.jspdf.jsPDF();
      d.setFontSize(14);d.text('Tabla de amortización — '+fmt(monto)+' · '+(tasaA*100).toFixed(1)+'% anual · '+plazo+' meses',14,16);
      d.autoTable({startY:22,head:[['Mes','Cuota','Capital','Interés','Saldo']],
        body:tabla.map(function(t){return [t[0],fmt(t[1]),fmt(t[2]),fmt(t[3]),fmt(t[4])];}),
        styles:{fontSize:8},headStyles:{fillColor:[15,23,42]}});
      d.save('Amortizacion_'+monto+'_'+plazo+'m.pdf');
    };
    (async function(){
      try{
        var ss=await sb.auth.getSession();
        var rr=await fetch(URLB+'/functions/v1/ai-analisis',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ss.data.session.access_token},
          body:JSON.stringify({tipo:'financiamiento',datos:{monto:monto,tasaPct:(tasaA*100).toFixed(1),plazo:plazo,cuota:cuota,cuotaSem:cuotaSem,totalPagar:totalPagar,intereses:intereses,prom:prom,crit:crit,viab:viab}})});
        var jj=await rr.json();
        var el=document.getElementById('fAna');
        if(el&&jj.texto)el.innerHTML='🧠 <b>Análisis IA — CFO Virtual:</b> '+esc(jj.texto);
        else if(el)el.innerHTML=el.innerHTML.replace(' <span class="muted">(generando análisis con IA...)</span>','');
      }catch(e){var el2=document.getElementById('fAna');if(el2)el2.innerHTML=el2.innerHTML.replace(' <span class="muted">(generando análisis con IA...)</span>','');}
    })();
  }
  document.getElementById('fSim').onclick=simular;
  simular();
}

var routes={dashboard:vDashboard,reporte:vReporte,financiamiento:vFinanciamiento,auditoria:vAuditoria,conexiones:vConexiones,facturas:vFacturas,movimientos:vMovimientos,contactos:vContactos,categorias:vCategorias,cxc:vCxc,flujo:vFlujo,proyectos:vProyectos,metricas:vMetricas,conciliacion:vConciliacion,impuestos:vImpuestos,perfil:vPerfil};

function render(){
  var app=document.getElementById('app');
  if(!session){app.innerHTML=loginHtml();bindLogin();return;}
  var route=(location.hash||'#/dashboard').replace('#/','');
  if(!routes[route])route='dashboard';
  app.innerHTML='<div class="shell"><aside class="side">'+sideHtml(route)+'</aside><main class="main" id="main"><p class="muted">Cargando...</p></main></div>';
  document.getElementById('logout').onclick=async function(){await sb.auth.signOut();session=null;location.hash='';render();};
  document.getElementById('themeTgl').onclick=toggleTheme;
  applyTheme();
  routes[route](document.getElementById('main'));
}

window.addEventListener('hashchange',render);
sb.auth.getSession().then(function(r){session=r.data.session;render();});
sb.auth.onAuthStateChange(function(_e,s){
  var had=!!session; session=s;
  if(!!s!==had)render();
});
</script>
</body>
</html>
